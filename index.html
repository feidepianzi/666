<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title></title><style>body{font-family:Arial,sans-serif;max-width:600px;margin:20px auto;padding:10px;text-align:center}.search-box{margin:150px 0}input[type=password]{padding:10px;font-size:16px;width:90%;max-width:300px;text-align:center;border:none;outline:none;border-bottom:1px solid #ccc}.result{font-size:80px;font-weight:bold;margin-top:10px;height:100px;line-height:100px;word-wrap:break-word;overflow:hidden}.result.found{color:green}.result.not-found{color:red}.secret-zone{position:absolute;top:0;right:0;width:100px;height:100px;cursor:pointer;opacity:0}.modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:1000}.modal{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:#fff;padding:30px;border-radius:8px;min-width:350px;max-width:90%;max-height:90vh;overflow-y:auto}.modal h2{margin-top:0;font-size:18px}.modal h3{margin:15px 0 5px;font-size:14px;color:#333}.modal textarea{width:100%;height:120px;margin:5px 0;padding:8px;font-size:13px;border:1px solid #ccc;border-radius:4px;box-sizing:border-box}.modal input[type=password]{padding:8px;font-size:14px;width:200px;margin:10px 0;box-sizing:border-box}.modal button{padding:8px 16px;font-size:14px;margin:5px;border:none;cursor:pointer;border-radius:4px}.modal .btn-save{background:#28a745;color:#fff}.modal .btn-cancel{background:#dc3545;color:#fff}.modal .btn-confirm{background:#007bff;color:#fff}.modal .btn-clear{background:#ffc107;color:#000}.array-count{font-size:12px;color:#666;margin-left:10px}.error-msg{color:red;font-size:14px;margin-top:10px}@media (max-width:600px){body{margin:10px auto;padding:5px}.result{font-size:60px;height:80px;line-height:80px}.modal{min-width:280px;padding:20px}}</style></head><body><script>document.write("<div class=\"secret-zone\" onclick=\"showPasswordPrompt()\"></div>\n\n<div class=\"search-box\">\n    <input type=\"password\" id=\"numberInput\" />\n</div>\n\n<div id=\"result\" class=\"result\"></div>\n\n<!-- \u5bc6\u7801\u5f39\u7a97 -->\n<div id=\"passwordModal\" class=\"modal-overlay\">\n    <div class=\"modal\">\n        <h2>\u8bf7\u8f93\u5165\u5bc6\u7801</h2>\n        <input type=\"password\" id=\"passwordInput\" placeholder=\"\u5bc6\u7801\" /><br/>\n        <button class=\"btn-confirm\" onclick=\"checkPassword()\">\u786e\u8ba4</button>\n        <button class=\"btn-cancel\" onclick=\"hidePasswordPrompt()\">\u53d6\u6d88</button>\n        <div id=\"passwordError\" class=\"error-msg\"></div>\n    </div>\n</div>\n\n<!-- \u7ba1\u7406\u5f39\u7a97 -->\n<div id=\"updateModal\" class=\"modal-overlay\">\n    <div class=\"modal\">\n        <h2>\u7ba1\u7406\u6570\u7ec4\u6570\u636e</h2>\n\n        <h3>\u4e3b\u6570\u7ec4 (frontend) <span id=\"countFrontend\" class=\"array-count\"></span></h3>\n        <textarea id=\"inputFrontend\" placeholder=\"\u6bcf\u884c\u4e00\u4e2a\u7f16\u53f7\"></textarea>\n        <button class=\"btn-clear\" onclick=\"clearFrontend()\">\u4e00\u952e\u6e05\u9664\u4e3b\u6570\u7ec4</button>\n\n        <h3>\u540e\u53f0\u6570\u7ec41 (backend1) <span id=\"countBackend1\" class=\"array-count\"></span></h3>\n        <textarea id=\"inputBackend1\" placeholder=\"\u6bcf\u884c\u4e00\u4e2a\u7f16\u53f7\"></textarea>\n        <button class=\"btn-clear\" onclick=\"clearBackend1()\">\u4e00\u952e\u6e05\u9664 backend1</button>\n\n        <h3>\u540e\u53f0\u6570\u7ec42 (backend2) <span id=\"countBackend2\" class=\"array-count\"></span></h3>\n        <textarea id=\"inputBackend2\" placeholder=\"\u6bcf\u884c\u4e00\u4e2a\u7f16\u53f7\"></textarea>\n        <button class=\"btn-clear\" onclick=\"clearBackend2()\">\u4e00\u952e\u6e05\u9664 backend2</button>\n\n        <div style=\"margin-top: 15px\">\n            <button class=\"btn-save\" onclick=\"saveAllArrays()\">\u4fdd\u5b58\u5168\u90e8</button>\n            <button class=\"btn-cancel\" onclick=\"hideUpdateModal()\">\u53d6\u6d88</button>\n        </div>\n        <div id=\"updateMsg\" class=\"error-msg\"></div>\n    </div>\n</div>");var PASSWORD=String.fromCharCode(...[208,200,198,206,201,206,202,202].map(function(c){return c^0xA7;}));var dataObj={frontend:[],backend1:[],backend2:[]};var numbersArray=[];async function loadArray(){try{var resp=await fetch("/api/data");if(resp.ok){dataObj=await resp.json();numbersArray=(dataObj.frontend||[]).concat(dataObj.backend1||[],dataObj.backend2||[]);}}catch(e){console.error("load error:",e);dataObj={frontend:[],backend1:[],backend2:[]};numbersArray=[];}}async function saveAllArraysToStorage(){await fetch("/api/data",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(dataObj)});}loadArray();var debounceTimer=null;function checkNumber(){var n=document.getElementById("numberInput").value.trim();var r=document.getElementById("result");if(!n){r.className="result";r.textContent="";return;}var found=numbersArray.indexOf(n)>=0;r.className="result "+(found?"found":"not-found");r.textContent=found?"\ud83d\udc4c":"\ud83d\ude12";}document.getElementById("numberInput").addEventListener("input",function(){clearTimeout(debounceTimer);debounceTimer=setTimeout(checkNumber,500);});document.getElementById("numberInput").addEventListener("keypress",function(e){if(e.key==="Enter"){clearTimeout(debounceTimer);checkNumber();}});function showPasswordPrompt(){var m=document.getElementById("passwordModal");m.style.display="block";document.getElementById("passwordInput").value="";document.getElementById("passwordError").textContent="";document.getElementById("passwordInput").focus();}function hidePasswordPrompt(){document.getElementById("passwordModal").style.display="none";}function checkPassword(){if(document.getElementById("passwordInput").value===PASSWORD){hidePasswordPrompt();showUpdateModal();}else{document.getElementById("passwordError").textContent="\u5bc6\u7801\u9519\u8bef\uff01";}}document.getElementById("passwordInput").addEventListener("keypress",function(e){if(e.key==="Enter")checkPassword();});function parseInput(input){if(!input.trim())return [];return input.split(/\W+/).map(function(s){return s.trim();}).filter(function(s){return/\d/.test(s);}).map(function(s){return s.replace(/^[^0-9]*/,"").replace(/[^0-9]+$/,"");});}function showUpdateModal(){document.getElementById("updateModal").style.display="block";document.getElementById("inputFrontend").value=(dataObj.frontend||[]).join("\\n");document.getElementById("inputBackend1").value=(dataObj.backend1||[]).join("\\n");document.getElementById("inputBackend2").value=(dataObj.backend2||[]).join("\\n");updateCounts();document.getElementById("updateMsg").textContent="";}function updateCounts(){var fe=parseInput(document.getElementById("inputFrontend").value);var b1=parseInput(document.getElementById("inputBackend1").value);var b2=parseInput(document.getElementById("inputBackend2").value);document.getElementById("countFrontend").textContent="("+fe.length+" \u6761)";document.getElementById("countBackend1").textContent="("+b1.length+" \u6761)";document.getElementById("countBackend2").textContent="("+b2.length+" \u6761)";}document.getElementById("inputFrontend").addEventListener("input",updateCounts);document.getElementById("inputBackend1").addEventListener("input",updateCounts);document.getElementById("inputBackend2").addEventListener("input",updateCounts);function hideUpdateModal(){document.getElementById("updateModal").style.display="none";}function clearFrontend(){if(confirm("\u786e\u5b9a\u8981\u6e05\u9664\u4e3b\u6570\u7ec4(frontend)\u5417\uff1f")){document.getElementById("inputFrontend").value="";updateCounts();}}function clearBackend1(){if(confirm("\u786e\u5b9a\u8981\u6e05\u9664 backend1 \u6570\u7ec4\u5417\uff1f")){document.getElementById("inputBackend1").value="";updateCounts();}}function clearBackend2(){if(confirm("\u786e\u5b9a\u8981\u6e05\u9664 backend2 \u6570\u7ec4\u5417\uff1f")){document.getElementById("inputBackend2").value="";updateCounts();}}async function saveAllArrays(){var msgEl=document.getElementById("updateMsg");dataObj.frontend=parseInput(document.getElementById("inputFrontend").value);dataObj.backend1=parseInput(document.getElementById("inputBackend1").value);dataObj.backend2=parseInput(document.getElementById("inputBackend2").value);var total=dataObj.frontend.length+dataObj.backend1.length+dataObj.backend2.length;if(total===0){msgEl.textContent="\u6ca1\u6709\u6709\u6548\u7684\u6570\u636e\uff01";msgEl.style.color="red";return;}await saveAllArraysToStorage();numbersArray=dataObj.frontend.concat(dataObj.backend1,dataObj.backend2);msgEl.textContent="\u4fdd\u5b58\u6210\u529f\uff01\u5171 "+total+" \u6761\u6570\u636e\u3002";msgEl.style.color="green";setTimeout(hideUpdateModal,2000);}</script></body></html>
